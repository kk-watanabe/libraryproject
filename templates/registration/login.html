<!DOCTYPE html>
<html lang='ja'>
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>
    <div class="container">
        <h1>ログイン画面</h1>
        <form method='post'>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">ログイン</button>
        </form>
        <br>
        未登録ユーザーの方：<a href={% url 'signup' %}>サインアップ</a>
    </div>
</body>
</html>
